<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AstraLumen — Un univers en cours de création</title>
  <meta name="description" content="AstraLumen est en cours de création. Littérature immersive, récits émotionnels et exploration — revenez bientôt." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="assets/logo-lune.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:      #d9a85a;
      --gold-hi:   #f0c976;
      --gold-deep: #8b6a2f;
      --gold-line: rgba(217,168,90,.32);
      --gold-dim:  rgba(217,168,90,.18);
      --ink:       #f1ece1;
      --ink-dim:   #b8b4ac;
      --ink-mute:  #7a7870;
      --serif:     "Cormorant Garamond", "Times New Roman", serif;
      --sans:      "Manrope", system-ui, sans-serif;
      --base:      #03060e;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--base);
    }

    body {
      font-family: var(--sans);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a { color: inherit; text-decoration: none; }

    /* ─── Skip link ─────────────────────────────── */
    .skip-link {
      position: absolute;
      top: -100px;
      left: 24px;
      z-index: 100;
      padding: 10px 16px;
      background: var(--gold);
      color: var(--base);
      font-size: 11px;
      letter-spacing: .18em;
      font-weight: 600;
      text-transform: uppercase;
      transition: top .25s ease;
    }
    .skip-link:focus { top: 24px; }

    /* ─── Background ────────────────────────────── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: url('docs/assets-source/AstraLumen-WIP-bg.png');
      background-size: cover;
      background-position: center;
    }
    .bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(105deg,
          rgba(3,6,14,.1)  0%,
          rgba(3,6,14,.55) 38%,
          rgba(3,6,14,.82) 58%,
          rgba(3,6,14,.92) 100%),
        linear-gradient(180deg,
          rgba(3,6,14,.55) 0%,
          transparent 16%,
          transparent 70%,
          rgba(3,6,14,.72) 100%);
    }

    /* ─── Sparkles ──────────────────────────────── */
    #sparkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }
    .spark {
      position: absolute;
      border-radius: 50%;
      background: var(--gold-hi);
      box-shadow: 0 0 5px 1px var(--gold-hi);
      opacity: 0;
      animation: sparkFloat linear infinite;
    }
    @keyframes sparkFloat {
      0%   { opacity: 0; transform: translate(0, 0) scale(.6); }
      12%  { opacity: .75; }
      88%  { opacity: .5; }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(1); }
    }

    /* ─── Frame ─────────────────────────────────── */
    .frame {
      position: fixed;
      inset: clamp(14px, 2.2vw, 26px);
      border: 1px solid var(--gold-line);
      pointer-events: none;
      z-index: 20;
    }

    .frame-corner {
      position: absolute;
      width: 16px;
      height: 16px;
      border-color: rgba(217,168,90,.7);
      border-style: solid;
    }
    .frame-corner.tl { top: -1px;    left:  -1px;  border-width: 2px 0 0 2px; }
    .frame-corner.tr { top: -1px;    right: -1px;  border-width: 2px 2px 0 0; }
    .frame-corner.bl { bottom: -1px; left:  -1px;  border-width: 0 0 2px 2px; }
    .frame-corner.br { bottom: -1px; right: -1px;  border-width: 0 2px 2px 0; }

    /* Top-center ornament */
    .frame-ornament {
      position: absolute;
      top: -13px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--base);
      padding: 0 8px;
      line-height: 0;
    }

    /* ─── Main layout ───────────────────────────── */
    main {
      position: relative;
      z-index: 5;
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr auto;
      justify-items: center;
      padding: clamp(36px, 5vw, 68px) clamp(36px, 5vw, 68px) clamp(24px, 3.5vw, 48px);
      gap: 0;
    }

    /* ─── Logo ──────────────────────────────────── */
    .logo-area {
      grid-column: 1;
      grid-row: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 11px;
      padding-bottom: 8px;
      opacity: 0;
      animation: fadeUp 1.1s cubic-bezier(.2,.7,.2,1) forwards;
      animation-delay: .3s;
    }
    .logo-lotus { width: 48px; height: 48px; }
    .logo-text {
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: .44em;
      color: var(--gold);
      text-transform: uppercase;
    }

    /* ─── Content ───────────────────────────────── */
    .content {
      grid-column: 1;
      grid-row: 2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 26px;
    }

    .content h1 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(34px, 4vw, 64px);
      line-height: 1.22;
      color: var(--ink);
      text-shadow: 0 2px 24px rgba(3,6,14,.8), 0 0 48px rgba(3,6,14,.6);
      opacity: 0;
      animation: fadeUp 1.3s cubic-bezier(.2,.7,.2,1) forwards;
      animation-delay: .65s;
    }

    .content .subtitle {
      font-family: var(--serif);
      font-size: clamp(15px, 1.4vw, 19px);
      font-weight: 300;
      line-height: 1.75;
      color: #cdc9c1;
      text-shadow: 0 1px 12px rgba(3,6,14,.9);
      max-width: 420px;
      margin: 0 auto;
      opacity: 0;
      animation: fadeUp 1.3s cubic-bezier(.2,.7,.2,1) forwards;
      animation-delay: .85s;
    }

    .content .note {
      font-family: var(--serif);
      font-style: italic;
      font-size: clamp(13px, 1.15vw, 16px);
      font-weight: 300;
      color: #9e9a92;
      text-shadow: 0 1px 10px rgba(3,6,14,.9);
      opacity: 0;
      animation: fadeUp 1.3s cubic-bezier(.2,.7,.2,1) forwards;
      animation-delay: 1.05s;
    }

    /* CTA */
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 20px;
      padding: 16px 26px;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: var(--sans);
      font-size: 10px;
      letter-spacing: .32em;
      font-weight: 600;
      text-transform: uppercase;
      background: transparent;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: color .5s ease;
      width: fit-content;
      margin-top: 6px;
      opacity: 0;
      animation: fadeUp 1.3s cubic-bezier(.2,.7,.2,1) forwards;
      animation-delay: 1.25s;
    }
    .cta::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--gold);
      transform: translateX(-101%);
      transition: transform .5s cubic-bezier(.7,0,.3,1);
      z-index: 0;
    }
    .cta:hover         { color: var(--base); }
    .cta:hover::before { transform: translateX(0); }
    .cta span,
    .cta svg  { position: relative; z-index: 1; }
    .cta svg  { transition: transform .4s ease; flex-shrink: 0; }
    .cta:hover svg { transform: translateX(5px); }
    .cta:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 4px;
    }

    /* ─── Categories ────────────────────────────── */
    .categories {
      grid-column: 1;
      grid-row: 3;
      display: flex;
      align-items: stretch;
      justify-content: center;
      border-top: 1px solid var(--gold-dim);
      padding-top: clamp(18px, 2.2vw, 28px);
      opacity: 0;
      animation: fadeUp 1.3s cubic-bezier(.2,.7,.2,1) forwards;
      animation-delay: 1.45s;
    }

    .cat {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 0 clamp(18px, 3vw, 44px);
      flex: 1;
      max-width: 230px;
    }
    .cat + .cat {
      border-left: 1px solid var(--gold-dim);
    }
    .cat-icon {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cat-icon svg { width: 100%; height: 100%; }
    .cat-label {
      font-family: var(--sans);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--ink-mute);
      line-height: 1.6;
    }

    /* ─── Fade-up keyframe ──────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Reduced motion ────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .logo-area, .content h1, .content .subtitle,
      .content .note, .cta, .categories {
        opacity: 1 !important;
        transform: none !important;
        animation: none !important;
      }
      .spark { display: none !important; }
      .cta, .cta::before { transition: none !important; }
    }

    /* ─── Mobile ────────────────────────────────── */
    @media (max-width: 768px) {
      html, body { overflow: auto; }
      main {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
        height: auto;
        min-height: 100vh;
        padding: 56px 28px 32px;
      }
      .logo-area { grid-column: 1; grid-row: 1; }
      .content   { grid-column: 1; grid-row: 2; padding-top: 36px; }
      .categories {
        grid-column: 1;
        grid-row: 3;
        flex-wrap: wrap;
        justify-content: center;
        gap: 16px;
        margin-top: 40px;
      }
      .cat {
        max-width: 50%;
        flex: 0 0 calc(50% - 8px);
        padding: 8px 0;
      }
      .cat + .cat { border-left: none; }
    }
  </style>
</head>
<body>

  <a class="skip-link" href="#content">Aller au contenu</a>

  <!-- Background -->
  <div class="bg" aria-hidden="true"></div>

  <!-- Sparkle particles -->
  <div id="sparkles" aria-hidden="true"></div>

  <!-- Golden frame -->
  <div class="frame" aria-hidden="true">
    <div class="frame-corner tl"></div>
    <div class="frame-corner tr"></div>
    <div class="frame-corner bl"></div>
    <div class="frame-corner br"></div>
    <div class="frame-ornament">
      <!-- Small lotus ornament, top-center of frame -->
      <svg width="26" height="22" viewBox="0 0 26 22" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M13 2 C11 6 10 9 13 13 C16 9 15 6 13 2Z"
              stroke="rgba(217,168,90,.65)" stroke-width=".7" fill="rgba(217,168,90,.07)"/>
        <path d="M4 10 C7 9 10 9 13 13 C10 16 7 15 4 10Z"
              stroke="rgba(217,168,90,.55)" stroke-width=".7" fill="rgba(217,168,90,.05)"/>
        <path d="M22 10 C19 9 16 9 13 13 C16 16 19 15 22 10Z"
              stroke="rgba(217,168,90,.55)" stroke-width=".7" fill="rgba(217,168,90,.05)"/>
        <path d="M7 4 C8 8 10 10 13 13 C13 9 11 7 7 4Z"
              stroke="rgba(217,168,90,.45)" stroke-width=".7" fill="rgba(217,168,90,.04)"/>
        <path d="M19 4 C18 8 16 10 13 13 C13 9 15 7 19 4Z"
              stroke="rgba(217,168,90,.45)" stroke-width=".7" fill="rgba(217,168,90,.04)"/>
        <circle cx="13" cy="13" r="1.6" fill="rgba(217,168,90,.55)"/>
        <circle cx="13" cy="13" r="3"   stroke="rgba(217,168,90,.25)" stroke-width=".5" fill="none"/>
      </svg>
    </div>
  </div>

  <!-- Main -->
  <main id="content">

    <!-- Logo -->
    <div class="logo-area" aria-label="AstraLumen">
      <svg class="logo-lotus" viewBox="0 0 54 54" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <!-- Outer petals -->
        <path d="M27 6 C23 13 21 20 27 27 C33 20 31 13 27 6Z"
              stroke="rgba(217,168,90,.75)" stroke-width=".9" fill="rgba(217,168,90,.07)"/>
        <path d="M6 27 C13 23 20 21 27 27 C20 33 13 31 6 27Z"
              stroke="rgba(217,168,90,.75)" stroke-width=".9" fill="rgba(217,168,90,.07)"/>
        <path d="M48 27 C41 23 34 21 27 27 C34 33 41 31 48 27Z"
              stroke="rgba(217,168,90,.75)" stroke-width=".9" fill="rgba(217,168,90,.07)"/>
        <!-- Diagonal petals -->
        <path d="M12 12 C14 20 18 23 27 27 C27 19 23 15 12 12Z"
              stroke="rgba(217,168,90,.6)" stroke-width=".9" fill="rgba(217,168,90,.05)"/>
        <path d="M42 12 C40 20 36 23 27 27 C27 19 31 15 42 12Z"
              stroke="rgba(217,168,90,.6)" stroke-width=".9" fill="rgba(217,168,90,.05)"/>
        <path d="M12 42 C14 34 18 31 27 27 C27 35 23 39 12 42Z"
              stroke="rgba(217,168,90,.6)" stroke-width=".9" fill="rgba(217,168,90,.05)"/>
        <path d="M42 42 C40 34 36 31 27 27 C27 35 31 39 42 42Z"
              stroke="rgba(217,168,90,.6)" stroke-width=".9" fill="rgba(217,168,90,.05)"/>
        <!-- Center -->
        <circle cx="27" cy="27" r="3.5"  fill="rgba(217,168,90,.55)"/>
        <circle cx="27" cy="27" r="6"    stroke="rgba(217,168,90,.28)" stroke-width=".7" fill="none"/>
        <circle cx="27" cy="27" r="9.5"  stroke="rgba(217,168,90,.12)" stroke-width=".5" fill="none"/>
      </svg>
      <span class="logo-text">Astralumen</span>
    </div>

    <!-- Main content -->
    <div class="content">
      <h1>Un univers en cours<br>de création...</h1>
      <p class="subtitle">
        Le grimoire s'écrit, les mondes se dévoilent,<br>
        patience, quelque chose de magique arrive.
      </p>
      <p class="note">Revenez bientôt pour découvrir l'univers d'Astralumen.</p>
      <a href="index.html" class="cta" aria-label="Retour à LumenLab">
        <span>Retour à LumenLab</span>
        <svg width="20" height="10" viewBox="0 0 20 10" fill="none" aria-hidden="true">
          <path d="M1 5 H18 M14 1 L18 5 L14 9"
                stroke="currentColor" stroke-width="1.4" stroke-linecap="square"/>
        </svg>
      </a>
    </div>

    <!-- Categories -->
    <footer class="categories" aria-label="Thèmes d'AstraLumen">

      <div class="cat">
        <span class="cat-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="rgba(217,168,90,.6)" stroke-width="1.15" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4.5C4 4.5 8 3.5 12 4.5C16 3.5 20 4.5 20 4.5L20 19.5C20 19.5 16 18.5 12 19.5C8 18.5 4 19.5 4 19.5Z"/>
            <line x1="12" y1="4.5" x2="12" y2="19.5"/>
          </svg>
        </span>
        <span class="cat-label">Littérature<br>Immersive</span>
      </div>

      <div class="cat">
        <span class="cat-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="rgba(217,168,90,.6)" stroke-width="1.15" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 4C14 4 8 8 6 14L4 20L10 18C16 16 20 10 20 4Z"/>
            <path d="M10 14L4 20"/>
          </svg>
        </span>
        <span class="cat-label">Récits<br>Émotionnels</span>
      </div>

      <div class="cat">
        <span class="cat-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="rgba(217,168,90,.6)" stroke-width="1.15" stroke-linecap="round">
            <circle cx="12" cy="12" r="9"/>
            <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
            <circle cx="12" cy="12" r="2.5" fill="rgba(217,168,90,.5)" stroke="none"/>
            <path d="M12 9.5L13.2 12L12 14.5L10.8 12Z" fill="rgba(217,168,90,.65)" stroke="none"/>
          </svg>
        </span>
        <span class="cat-label">Exploration<br>&amp; Rêve</span>
      </div>

    </footer>
  </main>

  <script>
    const container = document.getElementById('sparkles');
    for (let i = 0; i < 22; i++) {
      const el = document.createElement('div');
      el.className = 'spark';
      const size = 1 + Math.random() * 2;
      el.style.cssText = `
        left:${Math.random()*100}%;top:${Math.random()*100}%;
        width:${size}px;height:${size}px;
        --dx:${(Math.random()-.5)*70}px;
        --dy:${-50 - Math.random()*70}px;
        animation-duration:${11+Math.random()*14}s;
        animation-delay:${Math.random()*14}s;
      `;
      container.appendChild(el);
    }
  </script>

</body>
</html>
