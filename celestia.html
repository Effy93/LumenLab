<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CelestIA — Un projet en cours de construction</title>
  <meta name="description" content="CelestIA prend forme. Agents intelligents, création collaborative et organisation au service de la vision LumenLab." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preload" as="image" href="assets/bg-celestia-WIP.png" fetchpriority="high" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Manrope:wght@300;400;500;600;700&display=optional"
        rel="stylesheet" />
  <link rel="stylesheet" href="css/base/variables.css" />
  <link rel="stylesheet" href="css/pages/wip.css" />

  <style>
    /* ─── Tokens spécifiques à CelestIA ────────── */
    :root {
      --gold-line: rgba(217,168,90,.28);
      --gold-dim:  rgba(217,168,90,.13);
      --cyan-dim:  rgba(95,212,208,.16);
      --ink-dim:   #b8b4ac;
      --ink-mute:  #7a7870;
      --base:      #02040c;
    }

    html, body {
      height:   100%;
      overflow: hidden;
    }
    body { background: var(--base); }

    /* Variantes de couleur des particules */
    .spark.gold { background: var(--gold-hi); box-shadow: 0 0 5px 1px var(--gold-hi); }
    .spark.cyan { background: var(--cyan);    box-shadow: 0 0 5px 1px var(--cyan); }

    /* ─── Header / Nav ──────────────────────────── */
    header {
      position:       fixed;
      top: 0; left: 0; right: 0;
      z-index:        50;
      display:        flex;
      flex-direction: column;
      align-items:    center;
      gap:            5px;
      padding:        8px 16px;
      background:     linear-gradient(180deg, rgba(2,4,12,.96) 0%, transparent 100%);
      border-bottom:  1px solid var(--gold-dim);
    }
    .brand {
      display:        flex;
      align-items:    center;
      gap:            8px;
      font-family:    var(--serif);
      font-size:      15px;
      font-weight:    500;
      letter-spacing: .06em;
      color:          var(--ink);
      transition:     opacity .25s;
    }
    .brand:hover { opacity: .75; }
    .brand-mark {
      width:         14px;
      height:        14px;
      border-radius: 50%;
      background:    radial-gradient(circle at 35% 35%, var(--gold-hi), var(--gold) 45%, var(--gold-deep) 85%);
      box-shadow:    0 0 10px rgba(217,168,90,.6), 0 0 22px rgba(217,168,90,.22);
      position:      relative;
      flex-shrink:   0;
    }
    .brand-mark::after {
      content:       "";
      position:      absolute;
      inset:         -4px;
      border-radius: 50%;
      border:        1px solid rgba(217,168,90,.3);
    }
    .brand-text .lab { color: var(--gold); }
    .nav-links {
      display:    flex;
      gap:        clamp(20px, 3vw, 42px);
      list-style: none;
    }
    .nav-links a {
      font-size:      9px;
      font-weight:    500;
      letter-spacing: .14em;
      text-transform: uppercase;
      color:          var(--ink-mute);
      transition:     color .3s;
    }
    .nav-links a:hover { color: var(--ink); }

    @media (min-width: 480px) {
      header {
        flex-direction:  row;
        justify-content: space-between;
        height:          64px;
        padding:         0 clamp(24px, 4vw, 60px);
        gap:             0;
      }
      .brand      { font-size: 22px; gap: 12px; }
      .brand-mark { width: 20px; height: 20px; }
      .nav-links  { gap: clamp(20px, 3vw, 42px); }
      .nav-links a { font-size: 11px; letter-spacing: .24em; }
    }

    /* ─── Background fixe ───────────────────────── */
    .bg {
      position:            fixed;
      inset:               0;
      z-index:             0;
      background-image:    url('assets/bg-celestia-WIP.png');
      background-size:     cover;
      background-position: center;
    }
    .bg::after {
      content:  "";
      position: absolute;
      inset:    0;
      background:
        radial-gradient(ellipse at center,
          transparent     0%,
          transparent     28%,
          rgba(2,4,12,.18) 50%,
          rgba(2,4,12,.62) 75%,
          rgba(2,4,12,.88) 100%),
        linear-gradient(180deg,
          rgba(2,4,12,.82) 0%,
          transparent      18%,
          transparent      78%,
          rgba(2,4,12,.82) 100%);
    }

    /* ─── Main ──────────────────────────────────── */
    main {
      position:       relative;
      z-index:        5;
      height:         calc(100vh - 60px);
      margin-top:     60px;
      pointer-events: none;
    }
    @media (min-width: 480px) {
      main { height: calc(100vh - 64px); margin-top: 64px; }
    }

    /* ─── Titre ─────────────────────────────────── */
    .page-title {
      position:       absolute;
      top:            clamp(20px, 4vh, 48px);
      left: 0; right: 0;
      font-family:    var(--serif);
      font-weight:    300;
      font-size:      clamp(36px, 5.5vw, 64px);
      line-height:    1;
      color:          var(--ink);
      letter-spacing: -.01em;
      text-align:     center;
      pointer-events: auto;
      opacity:        0;
      animation:      fadeUp .9s cubic-bezier(.2,.7,.2,1) .3s forwards;
    }
    .page-title .ia { color: var(--gold); font-style: italic; }

    .page-sub {
      position:       absolute;
      top:            calc(clamp(20px, 4vh, 48px) + clamp(38px, 6vw, 68px) + 8px);
      left: 0; right: 0;
      font-family:    var(--serif);
      font-size:      clamp(12px, 1.4vw, 15px);
      font-weight:    300;
      color:          var(--ink-mute);
      letter-spacing: .06em;
      text-align:     center;
      pointer-events: auto;
      opacity:        0;
      animation:      fadeUp .9s cubic-bezier(.2,.7,.2,1) .5s forwards;
    }

    /* ─── Système orbital ───────────────────────── */
    /*
      Base mobile : système 300×300, centre (150,150)
      Rayon orbite : 105px  |  portrait : 82px (r=41)
      Charles 300° → left=18  top=57
      Astra    60° → left=200 top=57
      Caroline180° → left=109 top=214
    */
    .orbital-system {
      position:  fixed;
      top:       50vh;
      left:      50vw;
      width:     300px;
      height:    300px;
      opacity:   0;
      animation: fadeUpOrbit 1s cubic-bezier(.2,.7,.2,1) .7s forwards;
    }
    @keyframes fadeUpOrbit {
      from { opacity: 0; transform: translate(-50%, calc(-50% + 14px)); }
      to   { opacity: 1; transform: translate(-50%, -50%); }
    }

    .deco-ring {
      position:      absolute;
      inset:         0;
      border-radius: 50%;
      border:        1px solid rgba(217,168,90,.10);
    }
    .deco-arc-gold {
      position:      absolute;
      inset:         0;
      border-radius: 50%;
      border-top:    1.5px solid rgba(240,201,118,.55);
      border-right:  1.5px solid rgba(217,168,90,.18);
      border-bottom: 1.5px solid transparent;
      border-left:   1.5px solid transparent;
      filter:        drop-shadow(0 0 8px rgba(217,168,90,.6));
      animation:     spin 14s linear infinite;
    }
    .deco-arc-cyan {
      position:      absolute;
      inset:         10px;
      border-radius: 50%;
      border-bottom: 1px solid rgba(95,212,208,.32);
      border-left:   1px solid rgba(95,212,208,.12);
      border-top:    1px solid transparent;
      border-right:  1px solid transparent;
      animation:     spin 20s linear infinite reverse;
    }
    .orbit-spin {
      position:  absolute;
      inset:     0;
      animation: spin 28s linear infinite;
    }
    .satellite {
      position:      absolute;
      width:         82px;
      height:        82px;
      border-radius: 50%;
      overflow:      hidden;
      border:        1.5px solid var(--gold-line);
      box-shadow:    0 0 16px rgba(217,168,90,.28), 0 0 32px rgba(217,168,90,.10);
      background:    rgba(2,4,12,.55);
      animation:     spin 28s linear infinite reverse;
    }
    .satellite img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }

    .satellite-charles  { left: 18px;  top: 57px; }
    .satellite-astra    { left: 200px; top: 57px; }
    .satellite-caroline { left: 109px; top: 214px; }

    @media (min-width: 600px) {
      .orbital-system    { width: 440px; height: 440px; }
      .system-center     { width: 72px; height: 72px; left: 184px; top: 184px; }
      .satellite         { width: 96px; height: 96px; }
      .satellite-charles  { left: 38px;  top: 95px; }
      .satellite-astra    { left: 306px; top: 95px; }
      .satellite-caroline { left: 172px; top: 327px; }
    }

    /* ─── Bouton retour ─────────────────────────── */
    .cta {
      display:        inline-flex;
      align-items:    center;
      gap:            18px;
      padding:        13px 22px;
      border:         1px solid var(--gold);
      color:          var(--gold);
      font-family:    var(--sans);
      font-size:      10px;
      letter-spacing: .28em;
      font-weight:    600;
      text-transform: uppercase;
      background:     transparent;
      position:       absolute;
      bottom:         clamp(20px, 4vh, 40px);
      left:           50%;
      transform:      translateX(-50%);
      overflow:       hidden;
      transition:     color .4s;
      cursor:         pointer;
      pointer-events: auto;
      white-space:    nowrap;
      opacity:        0;
      animation:      fadeUpCta .9s cubic-bezier(.2,.7,.2,1) 1.15s forwards;
    }
    @keyframes fadeUpCta {
      from { opacity: 0; transform: translateX(-50%) translateY(14px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    .cta::before {
      content:    "";
      position:   absolute;
      inset:      0;
      background: var(--gold);
      transform:  translateX(-101%);
      transition: transform .4s cubic-bezier(.7,0,.3,1);
    }
    .cta:hover          { color: var(--base); }
    .cta:hover::before  { transform: translateX(0); }
    .cta span, .cta svg { position: relative; z-index: 1; }
    .cta svg            { transition: transform .3s; flex-shrink: 0; }
    .cta:hover svg      { transform: translateX(5px); }
    .cta:focus-visible  { outline: 2px solid var(--gold); outline-offset: 4px; }

    /* ─── Keyframes ─────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ─── Reduced motion ────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .page-title, .page-sub, .cta {
        opacity: 1 !important; animation: none !important;
      }
      .orbital-system {
        opacity: 1 !important; animation: none !important;
        transform: translate(-50%, -50%) !important;
      }
      .cta { transform: translateX(-50%) !important; }
      .deco-arc-gold, .deco-arc-cyan, .orbit-spin, .satellite { animation: none !important; }
      .spark { display: none !important; }
      .cta, .cta::before { transition: none !important; }
    }

    @media (max-height: 580px) {
      html, body { overflow: auto; }
    }
  </style>
</head>
<body>

  <!-- Fond réseau fixe -->
  <div class="bg" aria-hidden="true"></div>

  <!-- Particules -->
  <div id="sparkles" aria-hidden="true"></div>

  <!-- ════════════════════════════════════════════
       HEADER — Navigation LumenLab
  ════════════════════════════════════════════ -->
  <header>
    <a href="index.html" class="brand" aria-label="LumenLab — Retour à l'accueil">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-text">LUMEN<span class="lab">LAB</span></span>
    </a>
    <nav aria-label="Navigation principale">
      <ul class="nav-links" role="list">
        <li><a href="index.html">ACCUEIL</a></li>
        <li><a href="index.html#projets">PROJETS</a></li>
        <li><a href="index.html#vision">VISION</a></li>
      </ul>
    </nav>
  </header>

  <!-- ════════════════════════════════════════════
       MAIN — plein écran, centré verticalement
  ════════════════════════════════════════════ -->
  <main>

    <h1 class="page-title">Celest<span class="ia">IA</span></h1>
    <p class="page-sub">En cours de construction</p>

    <!-- Système orbital -->
    <div class="orbital-system" aria-label="Les trois intelligences de CelestIA en orbite">
      <div class="deco-ring"      aria-hidden="true"></div>
      <div class="deco-arc-gold"  aria-hidden="true"></div>
      <div class="deco-arc-cyan"  aria-hidden="true"></div>
      <div class="orbit-spin" aria-hidden="true">
        <div class="satellite satellite-charles">
          <img src="assets/Charles2.png" alt="" />
        </div>
        <div class="satellite satellite-astra">
          <img src="assets/Astra2.png" alt="" />
        </div>
        <div class="satellite satellite-caroline">
          <img src="assets/Caro2.png" alt="" />
        </div>
      </div>
    </div>

    <!-- Bouton retour -->
    <a href="index.html" class="cta" aria-label="Retour à LumenLab">
      <span>Retour vers LumenLab</span>
      <svg width="18" height="9" viewBox="0 0 18 9" fill="none" aria-hidden="true">
        <path d="M1 4.5 H16 M12.5 1 L16 4.5 L12.5 8"
              stroke="currentColor" stroke-width="1.3" stroke-linecap="square" />
      </svg>
    </a>

  </main>

  <script>
    const sc = document.getElementById('sparkles');
    for (let i = 0; i < 28; i++) {
      const el = document.createElement('div');
      el.className = 'spark ' + (Math.random() > .38 ? 'gold' : 'cyan');
      const s = .8 + Math.random() * 2;
      el.style.cssText = `
        left:${Math.random()*100}%;
        top:${Math.random()*100}%;
        width:${s}px; height:${s}px;
        --dx:${(Math.random()-.5)*80}px;
        --dy:${-40 - Math.random()*70}px;
        animation-duration:${12+Math.random()*14}s;
        animation-delay:${Math.random()*16}s;
      `;
      sc.appendChild(el);
    }
  </script>

</body>
</html>
