<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CelestIA — Un projet en cours de construction</title>
    <meta
      name="description"
      content="CelestIA prend forme. Agents intelligents, création collaborative et organisation au service de la vision LumenLab."
    />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preload" as="image" href="assets/bg-celestia-WIP.png" fetchpriority="high" />
    <link rel="icon" type="image/png" href="assets/logo-lune.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Manrope:wght@300;400;500;600;700&display=optional"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/base/variables.css" />
    <link rel="stylesheet" href="css/components/navbar.css" />
    <link rel="stylesheet" href="css/pages/wip.css" />
    <link rel="stylesheet" href="css/pages/celestia.css" />
  </head>
  <body>
    <!-- Fond réseau fixe -->
    <div class="bg" aria-hidden="true"></div>

    <!-- Particules -->
    <div id="sparkles" aria-hidden="true"></div>

    <!-- ════════════════════════════════════════════
       HEADER — Navigation LumenLab
  ════════════════════════════════════════════ -->
    <header>
      <a href="index.html" class="brand" aria-label="LumenLab — Retour à l'accueil">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text">LUMEN<span class="lab">LAB</span></span>
      </a>
      <nav aria-label="Navigation principale">
        <ul class="nav-links" role="list">
          <li><a href="index.html">ACCUEIL</a></li>
          <li><a href="index.html#projets">PROJETS</a></li>
          <li><a href="index.html#vision">VISION</a></li>
        </ul>
      </nav>
    </header>

    <!-- ════════════════════════════════════════════
       MAIN — plein écran, centré verticalement
  ════════════════════════════════════════════ -->
    <main>
      <h1 class="page-title">Celest<span class="ia">IA</span></h1>
      <p class="page-sub">En cours de construction</p>

      <!-- Système orbital -->
      <div class="orbital-system" aria-label="Les trois intelligences de CelestIA en orbite">
        <div class="deco-ring" aria-hidden="true"></div>
        <div class="deco-arc-gold" aria-hidden="true"></div>
        <div class="deco-arc-cyan" aria-hidden="true"></div>
        <div class="orbit-spin" aria-hidden="true">
          <div class="satellite satellite-charles">
            <img src="assets/Charles2.png" alt="" />
          </div>
          <div class="satellite satellite-astra">
            <img src="assets/Astra2.png" alt="" />
          </div>
          <div class="satellite satellite-caroline">
            <img src="assets/Caro2.png" alt="" />
          </div>
        </div>
      </div>

      <!-- Bouton retour -->
      <a href="index.html#projet-celestia" class="cta" aria-label="Retour à LumenLab">
        <span>Retour vers LumenLab</span>
        <svg width="18" height="9" viewBox="0 0 18 9" fill="none" aria-hidden="true">
          <path
            d="M1 4.5 H16 M12.5 1 L16 4.5 L12.5 8"
            stroke="currentColor"
            stroke-width="1.3"
            stroke-linecap="square"
          />
        </svg>
      </a>
    </main>

    <script>
      const sc = document.getElementById('sparkles');
      for (let i = 0; i < 28; i++) {
        const el = document.createElement('div');
        el.className = 'spark ' + (Math.random() > 0.38 ? 'gold' : 'cyan');
        const s = 0.8 + Math.random() * 2;
        el.style.cssText = `
        left:${Math.random() * 100}%;
        top:${Math.random() * 100}%;
        width:${s}px; height:${s}px;
        --dx:${(Math.random() - 0.5) * 80}px;
        --dy:${-40 - Math.random() * 70}px;
        animation-duration:${12 + Math.random() * 14}s;
        animation-delay:${Math.random() * 16}s;
      `;
        sc.appendChild(el);
      }
    </script>
  </body>
</html>
