<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CelestIA — Un projet en cours de construction</title>
  <meta name="description" content="CelestIA prend forme. Agents intelligents, création collaborative et organisation au service de la vision LumenLab." />
  <meta name="robots" content="noindex, nofollow" />
  <!-- <link rel="icon" type="image/png" href="assets/vision-orbit.png" /> -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:      #d9a85a;
      --gold-hi:   #f0c976;
      --gold-deep: #8b6a2f;
      --gold-line: rgba(217,168,90,.28);
      --gold-dim:  rgba(217,168,90,.13);
      --cyan:      #5fd4d0;
      --cyan-dim:  rgba(95,212,208,.16);
      --ink:       #f1ece1;
      --ink-dim:   #b8b4ac;
      --ink-mute:  #7a7870;
      --serif:     "Cormorant Garamond", "Times New Roman", serif;
      --sans:      "Manrope", system-ui, sans-serif;
      --base:      #02040c;
    }

    /* ─── Pas de scroll ─────────────────────────── */
    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--sans);
      color: var(--ink);
      background: var(--base);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a { color: inherit; text-decoration: none; }

    /* ─── Background fixe ───────────────────────── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: url('assets/bg-celestia-WIP.png');
      background-size: cover;
      background-position: center;
    }
    .bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at center,
          transparent 0%,
          transparent 28%,
          rgba(2,4,12,.18) 50%,
          rgba(2,4,12,.62) 75%,
          rgba(2,4,12,.88) 100%),
        linear-gradient(180deg,
          rgba(2,4,12,.82) 0%,
          transparent 18%,
          transparent 78%,
          rgba(2,4,12,.82) 100%);
    }

    /* ─── Particules ────────────────────────────── */
    #sparkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }
    .spark {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: sparkFloat linear infinite;
    }
    .spark.gold { background: var(--gold-hi); box-shadow: 0 0 5px 1px var(--gold-hi); }
    .spark.cyan { background: var(--cyan);    box-shadow: 0 0 5px 1px var(--cyan); }
    @keyframes sparkFloat {
      0%   { opacity: 0; transform: translate(0,0) scale(.5); }
      12%  { opacity: .7; }
      88%  { opacity: .4; }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(1.1); }
    }

    /* ─── Header / Nav ──────────────────────────── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(24px, 4vw, 60px);
      background: linear-gradient(180deg, rgba(2,4,12,.96) 0%, transparent 100%);
      border-bottom: 1px solid var(--gold-dim);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 500;
      letter-spacing: .06em;
      color: var(--ink);
      transition: opacity .25s;
    }
    .brand:hover { opacity: .75; }

    .brand-mark {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, var(--gold-hi), var(--gold) 45%, var(--gold-deep) 85%);
      box-shadow: 0 0 16px rgba(217,168,90,.6), 0 0 32px rgba(217,168,90,.22);
      position: relative;
      flex-shrink: 0;
    }
    .brand-mark::after {
      content: "";
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 1px solid rgba(217,168,90,.3);
    }
    .brand-text .lab { color: var(--gold); }

    .nav-links {
      display: flex;
      gap: clamp(20px, 3vw, 42px);
      list-style: none;
    }
    .nav-links a {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .24em;
      text-transform: uppercase;
      color: var(--ink-mute);
      transition: color .3s;
    }
    .nav-links a:hover { color: var(--ink); }

    /* ─── Main : conteneur relatif, plein écran ─── */
    main {
      position: relative;
      z-index: 5;
      height: calc(100vh - 64px);
      margin-top: 64px;
      pointer-events: none;
    }

    /* ─── Titre : ancré en haut, centré ─────────── */
    .page-title {
      position: absolute;
      top: clamp(20px, 4vh, 48px);
      left: 0; right: 0;
      font-family: var(--serif);
      font-weight: 300;
      font-size: clamp(36px, 5.5vw, 64px);
      line-height: 1;
      color: var(--ink);
      letter-spacing: -.01em;
      text-align: center;
      pointer-events: auto;
      opacity: 0;
      animation: fadeUp .9s cubic-bezier(.2,.7,.2,1) .3s forwards;
    }
    .page-title .ia { color: var(--gold); font-style: italic; }

    .page-sub {
      position: absolute;
      top: calc(clamp(20px, 4vh, 48px) + clamp(38px, 6vw, 68px) + 8px);
      left: 0; right: 0;
      font-family: var(--serif);
      font-size: clamp(12px, 1.4vw, 15px);
      font-weight: 300;
      color: var(--ink-mute);
      letter-spacing: .06em;
      text-align: center;
      pointer-events: auto;
      opacity: 0;
      animation: fadeUp .9s cubic-bezier(.2,.7,.2,1) .5s forwards;
    }

    /* ─── Système orbital — mobile first ───────────
      Base mobile : système 300×300, centre (150,150)
      Rayon orbite : 105px  |  portrait : 82px (r=41)
        x = cx + r·sin(θ)   left = x − r_portrait
        y = cy − r·cos(θ)   top  = y − r_portrait
      Charles  300° → left=18   top=57
      Astra     60° → left=200  top=57
      Caroline 180° → left=109  top=214
      Centre orbe : 60px  → left=120  top=120
    ──────────────────────────────────────────── */
    .orbital-system {
      position: fixed;
      top: 50vh;
      left: 50vw;
      width: 300px;
      height: 300px;
      /* centrage exact + fadeUp combinés dans un seul keyframe */
      opacity: 0;
      animation: fadeUpOrbit 1s cubic-bezier(.2,.7,.2,1) .7s forwards;
    }

    @keyframes fadeUpOrbit {
      from { opacity: 0; transform: translate(-50%, calc(-50% + 14px)); }
      to   { opacity: 1; transform: translate(-50%, -50%); }
    }

    /* Anneau décoratif statique */
    .deco-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(217,168,90,.10);
    }

    /* Arc doré — sens horaire */
    .deco-arc-gold {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border-top:    1.5px solid rgba(240,201,118,.55);
      border-right:  1.5px solid rgba(217,168,90,.18);
      border-bottom: 1.5px solid transparent;
      border-left:   1.5px solid transparent;
      filter: drop-shadow(0 0 8px rgba(217,168,90,.6));
      animation: spin 14s linear infinite;
    }

    /* Arc cyan — sens anti-horaire */
    .deco-arc-cyan {
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      border-bottom: 1px solid rgba(95,212,208,.32);
      border-left:   1px solid rgba(95,212,208,.12);
      border-top:    1px solid transparent;
      border-right:  1px solid transparent;
      animation: spin 20s linear infinite reverse;
    }


    /* Conteneur des satellites — tourne en continu */
    .orbit-spin {
      position: absolute;
      inset: 0;
      animation: spin 28s linear infinite;
    }

    /* Portrait satellite — contre-rotation pour rester droit */
    .satellite {
      position: absolute;
      width: 82px; height: 82px;
      border-radius: 50%;
      overflow: hidden;
      border: 1.5px solid var(--gold-line);
      box-shadow:
        0 0 16px rgba(217,168,90,.28),
        0 0 32px rgba(217,168,90,.10);
      background: rgba(2,4,12,.55);
      animation: spin 28s linear infinite reverse;
    }
    .satellite img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    /* Positions mobile (rayon 105, r_portrait 41) */
    .satellite-charles  { left: 18px;  top: 57px; }
    .satellite-astra    { left: 200px; top: 57px; }
    .satellite-caroline { left: 109px; top: 214px; }


    /* ─── Bouton retour : ancré en bas, centré ──── */
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 18px;
      padding: 13px 22px;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: var(--sans);
      font-size: 10px;
      letter-spacing: .28em;
      font-weight: 600;
      text-transform: uppercase;
      background: transparent;
      position: absolute;
      bottom: clamp(20px, 4vh, 40px);
      left: 50%;
      transform: translateX(-50%);
      overflow: hidden;
      transition: color .4s;
      cursor: pointer;
      pointer-events: auto;
      white-space: nowrap;
      opacity: 0;
      animation: fadeUpCta .9s cubic-bezier(.2,.7,.2,1) 1.15s forwards;
    }

    @keyframes fadeUpCta {
      from { opacity: 0; transform: translateX(-50%) translateY(14px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    .cta::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--gold);
      transform: translateX(-101%);
      transition: transform .4s cubic-bezier(.7,0,.3,1);
    }
    .cta:hover { color: var(--base); }
    .cta:hover::before { transform: translateX(0); }
    .cta span, .cta svg { position: relative; z-index: 1; }
    .cta svg { transition: transform .3s; flex-shrink: 0; }
    .cta:hover svg { transform: translateX(5px); }
    .cta:focus-visible { outline: 2px solid var(--gold); outline-offset: 4px; }

    /* ─── Keyframes ─────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ─── Desktop ≥600px ───────────────────────────
      Système 440×440, centre (220,220)
      Rayon orbite : 155px  |  portrait : 96px (r=48)
      Charles  300° → left=38   top=95
      Astra     60° → left=306  top=95
      Caroline 180° → left=172  top=327
      Centre orbe : 72px  → left=184  top=184
    ─────────────────────────────────────────────── */
    @media (min-width: 600px) {
      /* Système 440×440, centre (220,220), rayon 155px, portrait 96px (r=48) */
      .orbital-system { width: 440px; height: 440px; }
      .system-center  { width: 72px; height: 72px; left: 184px; top: 184px; }
      .satellite      { width: 96px; height: 96px; }
      .satellite-charles  { left: 38px;  top: 95px; }
      .satellite-astra    { left: 306px; top: 95px; }
      .satellite-caroline { left: 172px; top: 327px; }
    }

    /* ─── Reduced motion ────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .page-title, .page-sub, .cta {
        opacity: 1 !important; animation: none !important;
      }
      .orbital-system {
        opacity: 1 !important;
        animation: none !important;
        transform: translate(-50%, -50%) !important;
      }
      .cta { transform: translateX(-50%) !important; }
      .deco-arc-gold, .deco-arc-cyan, .orbit-spin, .satellite { animation: none !important; }
      .spark { display: none !important; }
      .cta, .cta::before { transition: none !important; }
    }

    /* Sur écrans très courts : autoriser le scroll minimal */
    @media (max-height: 580px) {
      html, body { overflow: auto; }
    }
  </style>
</head>
<body>

  <!-- Fond réseau fixe -->
  <div class="bg" aria-hidden="true"></div>

  <!-- Particules -->
  <div id="sparkles" aria-hidden="true"></div>

  <!-- ════════════════════════════════════════════
       HEADER — Navigation LumenLab
  ════════════════════════════════════════════ -->
  <header>
    <a href="index.html" class="brand" aria-label="LumenLab — Retour à l'accueil">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-text">LUMEN<span class="lab">LAB</span></span>
    </a>
    <nav aria-label="Navigation principale">
      <ul class="nav-links" role="list">
        <li><a href="index.html#projets">PROJETS</a></li>
        <li><a href="index.html#vision">VISION</a></li>
      </ul>
    </nav>
  </header>

  <!-- ════════════════════════════════════════════
       MAIN — plein écran, centré verticalement
  ════════════════════════════════════════════ -->
  <main>

    <!-- Titre compact -->
    <h1 class="page-title">Celest<span class="ia">IA</span></h1>
    <p class="page-sub">En cours de construction</p>

    <!-- Système orbital -->
    <div class="orbital-system" aria-label="Les trois intelligences de CelestIA en orbite">

      <!-- Anneau décoratif -->
      <div class="deco-ring"      aria-hidden="true"></div>
      <div class="deco-arc-gold"  aria-hidden="true"></div>
      <div class="deco-arc-cyan"  aria-hidden="true"></div>

      <!-- Portraits en orbite -->
      <div class="orbit-spin" aria-hidden="true">
        <div class="satellite satellite-charles">
          <img src="assets/Charles2.png" alt="" />
        </div>
        <div class="satellite satellite-astra">
          <img src="assets/Astra2.png" alt="" />
        </div>
        <div class="satellite satellite-caroline">
          <img src="assets/Caro2.png" alt="" />
        </div>
      </div>

    </div>

    <!-- Bouton retour -->
    <a href="index.html" class="cta" aria-label="Retour à LumenLab">
      <span>Retour vers LumenLab</span>
      <svg width="18" height="9" viewBox="0 0 18 9" fill="none" aria-hidden="true">
        <path d="M1 4.5 H16 M12.5 1 L16 4.5 L12.5 8"
              stroke="currentColor" stroke-width="1.3" stroke-linecap="square" />
      </svg>
    </a>

  </main>

  <script>
    /* Particules or + cyan */
    const sc = document.getElementById('sparkles');
    for (let i = 0; i < 28; i++) {
      const el = document.createElement('div');
      el.className = 'spark ' + (Math.random() > .38 ? 'gold' : 'cyan');
      const s = .8 + Math.random() * 2;
      el.style.cssText = `
        left:${Math.random()*100}%;
        top:${Math.random()*100}%;
        width:${s}px; height:${s}px;
        --dx:${(Math.random()-.5)*80}px;
        --dy:${-40 - Math.random()*70}px;
        animation-duration:${12+Math.random()*14}s;
        animation-delay:${Math.random()*16}s;
      `;
      sc.appendChild(el);
    }
  </script>

</body>
</html>
